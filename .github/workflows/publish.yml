name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (package + check, no upload)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Lockfile preflight
        run: |
          set -euo pipefail
          git ls-files --error-unmatch Cargo.lock >/dev/null
          cargo metadata --locked --format-version 1 --no-deps >/dev/null
          git diff --exit-code -- Cargo.lock
      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
        run: |
          set -euo pipefail
          cargo package --locked --features chip-ws63
          cargo publish --locked --features chip-ws63 --no-verify $DRY
